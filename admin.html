<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | GANKETI</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f4f4f5; color: #18181b; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h2 { text-align: center; margin-bottom: 20px; font-weight: 700; letter-spacing: 1px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 5px; color: #52525b; }
        input, select { width: 100%; padding: 12px; border: 1px solid #e4e4e7; border-radius: 8px; font-family: inherit; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #000; color: white; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; transition: 0.3s; margin-top: 10px;}
        button:hover { background: #27272a; }
        #status { text-align: center; margin-top: 15px; font-size: 14px; font-weight: 600; }
    </style>
</head>
<body>

    <div class="container">
        <h2>GANKETI ADMIN STUDIO</h2>
        
        <div class="form-group">
            <label>Nama Produk</label>
            <input type="text" id="pName" placeholder="Contoh: GANKETI Oversized T-Shirt">
        </div>
        
        <div class="form-group">
            <label>Kategori</label>
            <select id="pCategory">
                <option value="T-Shirt">T-Shirt</option>
                <option value="Hoodie">Hoodie</option>
                <option value="Jacket">Jacket</option>
                <option value="Pants">Pants</option>
                <option value="Accessories">Accessories</option>
            </select>
        </div>
        
        <div class="form-group">
            <label>Harga Jual (Rp)</label>
            <input type="number" id="pPrice" placeholder="Contoh: 185000">
        </div>

        <div class="form-group">
            <label>Upload Foto Produk (Maks 1MB)</label>
            <input type="file" id="pImage" accept="image/*">
        </div>

        <button onclick="uploadProduct()">UPLOAD KE TOKO</button>
        <div id="status"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        // Kunci Firebase GANKETI
        const firebaseConfig = {
            apiKey: "AIzaSyDoh1VBH6YEicKHPyViPi0NUsnILaTin8g",
            authDomain: "ganketi.firebaseapp.com",
            databaseURL: "https://ganketi-default-rtdb.firebaseio.com",
            projectId: "ganketi",
            storageBucket: "ganketi.firebasestorage.app",
            messagingSenderId: "61078873925",
            appId: "1:61078873925:web:c5bf3bdf7cc18f11d6002c"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function uploadProduct() {
            const name = document.getElementById('pName').value;
            const category = document.getElementById('pCategory').value;
            const price = document.getElementById('pPrice').value;
            const imageFile = document.getElementById('pImage').files[0];
            const statusLabel = document.getElementById('status');

            if(!name || !price || !imageFile) {
                statusLabel.style.color = "red";
                statusLabel.innerText = "Isi semua data dan pilih foto!";
                return;
            }

            if(imageFile.size > 1024 * 1024) {
                statusLabel.style.color = "red";
                statusLabel.innerText = "Ukuran foto terlalu besar! Maksimal 1MB.";
                return;
            }

            statusLabel.style.color = "blue";
            statusLabel.innerText = "Sedang mengunggah...";

            // Ubah gambar jadi teks Base64 untuk disimpan ke Database
            const reader = new FileReader();
            reader.onload = function(e) {
                const base64Image = e.target.result;

                // Simpan ke Firebase branch 'products'
                db.ref('products').push({
                    name: name,
                    category: category,
                    price: parseInt(price),
                    image: base64Image,
                    timestamp: Date.now()
                }).then(() => {
                    statusLabel.style.color = "green";
                    statusLabel.innerText = "Berhasil! Produk sudah tampil di toko depan.";
                    // Reset form
                    document.getElementById('pName').value = '';
                    document.getElementById('pPrice').value = '';
                    document.getElementById('pImage').value = '';
                }).catch((error) => {
                    statusLabel.style.color = "red";
                    statusLabel.innerText = "Gagal: " + error.message;
                });
            };
            reader.readAsDataURL(imageFile);
        }
    </script>
</body>
</html>
