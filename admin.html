<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GANKETI | ERP Command Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #0a0a0a; color: #fff; display: flex; justify-content: center; min-height: 100vh; margin: 0; padding: 20px;}
        .container { background: #141414; padding: 30px; border-radius: 12px; width: 100%; max-width: 900px; border: 1px solid #333; }
        h2 { text-align: center; margin-bottom: 20px; letter-spacing: 2px; font-weight: 800; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;}
        .tab-btn { flex: 1; padding: 10px; min-width: 140px; background: #222; color: #aaa; border: 1px solid #333; border-radius: 8px; font-weight: 700; cursor: pointer; transition: 0.3s; font-size: 12px;}
        .tab-btn.active { background: #fff; color: #000; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 11px; color: #aaa; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px;}
        input, select { width: 100%; padding: 12px; border: 1px solid #444; background: #222; color: white; border-radius: 8px; box-sizing: border-box; font-family: 'Poppins', sans-serif;}
        .btn-action { width: 100%; padding: 15px; background: #fff; color: #000; border: none; border-radius: 8px; font-weight: 800; cursor: pointer; margin-top: 10px; text-transform: uppercase; letter-spacing: 1px;}
        .btn-action:hover { background: #ccc; }
        .order-card { background: #222; border: 1px solid #333; border-radius: 8px; padding: 15px; margin-bottom: 15px; font-size: 13px; }
        .order-header { display: flex; justify-content: space-between; border-bottom: 1px dashed #444; padding-bottom: 10px; margin-bottom: 10px; font-weight: bold; }
        .badge-status { padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: 800; text-transform: uppercase;}
        .status-UNPAID { background: #ef4444; color: white; }
        .status-PAID { background: #f59e0b; color: #000; }
        .status-SHIPPED { background: #4ade80; color: #000; }
        .btn-status { background: transparent; border: 1px solid #fff; color: #fff; padding: 5px 10px; font-size: 11px; cursor: pointer; margin-top: 10px; border-radius: 4px; font-weight: 600;}
        .finance-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .fin-card { background: #1a1a1a; padding: 20px; border-radius: 12px; border: 1px solid #333; text-align: center;}
        .fin-title { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; font-weight: 600;}
        .fin-val { font-size: 22px; font-weight: 800; }
        #loginWorkspace { text-align: center; max-width: 400px; margin: 100px auto; }
    </style>
</head>
<body>
    <div class="container">
        <h2>GANKETI <span style="font-weight:300;">ERP SYSTEM</span></h2>
        
        <div id="loginWorkspace">
            <button class="btn-action" style="background:#4285F4; color:white; border:none;" onclick="loginGoogle()">🔒 LOGIN VIA GOOGLE</button>
            <div id="loginStatus" style="color:#ef4444; margin-top:15px; font-size:13px;"></div>
        </div>

        <div id="adminWorkspace" style="display:none;">
            <div style="text-align:right; font-size:11px; color:#ef4444; cursor:pointer; margin-bottom:15px; font-weight: 600;" onclick="logout()">[ Keluar Sistem ]</div>
            
            <div class="tabs">
                <button class="tab-btn active" id="tabUploadBtn" onclick="switchTab('upload')">📦 UPLOAD BARU</button>
                <button class="tab-btn" id="tabManageBtn" onclick="switchTab('manage')">📝 KELOLA PRODUK</button>
                <button class="tab-btn" id="tabOrdersBtn" onclick="switchTab('orders')">🛒 PESANAN</button>
                <button class="tab-btn" id="tabFinanceBtn" onclick="switchTab('finance')">📊 KEUANGAN</button>
            </div>

            <div id="tabUpload">
                <div class="form-group"><label>Nama Produk</label><input type="text" id="pName"></div>
                <div class="form-group"><label>Kategori</label>
                    <select id="pCategory"><option value="T-Shirt">T-Shirt</option><option value="Hoodie">Hoodie</option><option value="Jacket">Jacket</option><option value="Pants">Pants</option><option value="Accessories">Accessories</option></select>
                </div>
                <div style="display: flex; gap: 10px;">
                    <div class="form-group" style="flex:1;"><label>Modal Supplier</label><input type="number" id="pCost"></div>
                    <div class="form-group" style="flex:1;"><label>Harga Jual</label><input type="number" id="pPrice"></div>
                    <div class="form-group" style="flex:1;"><label>Jumlah Stok</label><input type="number" id="pStock" placeholder="Contoh: 50"></div>
                </div>
                <div class="form-group">
                    <label>Foto Produk (Pilih 1 - 5 Foto | Maks 1MB/foto)</label>
                    <input type="file" id="pImages" accept="image/*" multiple style="padding: 9px;">
                </div>
                <button class="btn-action" onclick="uploadProduct()">UPLOAD KE ETALASE</button>
                <div id="statusMessage" style="text-align:center; margin-top:15px; font-size:13px; font-weight: 600;"></div>
            </div>

            <div id="tabManage" style="display:none;">
                <h3 style="font-size: 14px; margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 5px;">Manajemen Stok Etalase</h3>
                <div id="manageProductsList"><p style="color:#aaa; text-align:center;">Memuat produk...</p></div>
            </div>

            <div id="tabOrders" style="display:none;"><div id="ordersList"></div></div>

            <div id="tabFinance" style="display:none;">
                <div class="finance-grid">
                    <div class="fin-card"><div class="fin-title">Omzet Kotor</div><div class="fin-val" style="color:#3b82f6;" id="finOmzet">Rp 0</div></div>
                    <div class="fin-card"><div class="fin-title">Tagihan PO Supplier</div><div class="fin-val" style="color:#ef4444;" id="finHPP">Rp 0</div></div>
                    <div class="fin-card" style="border-color: #4ade80;"><div class="fin-title">Laba GANKETI</div><div class="fin-val" style="color:#4ade80;" id="finLaba">Rp 0</div></div>
                </div>
                <h3 style="font-size: 14px; margin-bottom: 10px; border-bottom: 1px solid #333; padding-bottom: 5px;">Rekap Pembelanjaan PO per Order</h3>
                <div id="poListTable" style="max-height: 400px; overflow-y: auto; font-size: 12px;"></div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyDoh1VBH6YEicKHPyViPi0NUsnILaTin8g", authDomain: "ganketi.firebaseapp.com", databaseURL: "https://ganketi-default-rtdb.firebaseio.com", projectId: "ganketi", storageBucket: "ganketi.firebasestorage.app", messagingSenderId: "61078873925", appId: "1:61078873925:web:c5bf3bdf7cc18f11d6002c" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(); const db = firebase.database();

        function switchTab(tabName) {
            ['upload', 'manage', 'orders', 'finance'].forEach(t => {
                document.getElementById('tab' + t.charAt(0).toUpperCase() + t.slice(1)).style.display = tabName === t ? 'block' : 'none';
                document.getElementById('tab' + t.charAt(0).toUpperCase() + t.slice(1) + 'Btn').className = tabName === t ? 'tab-btn active' : 'tab-btn';
            });
            if(tabName === 'finance') loadFinanceReport(); if(tabName === 'manage') loadManageProducts();
        }

        auth.onAuthStateChanged(user => {
            if (user && user.email === "ganketistore@gmail.com") {
                document.getElementById('loginWorkspace').style.display = 'none'; document.getElementById('adminWorkspace').style.display = 'block'; loadOrders(); 
            } else if (user) { auth.signOut(); } 
            else { document.getElementById('loginWorkspace').style.display = 'block'; document.getElementById('adminWorkspace').style.display = 'none'; }
        });
        function loginGoogle() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
        function logout() { auth.signOut(); }

        function uploadProduct() {
            const name = document.getElementById('pName').value; const category = document.getElementById('pCategory').value;
            const cost = document.getElementById('pCost').value; const price = document.getElementById('pPrice').value; 
            const stock = document.getElementById('pStock').value; const files = document.getElementById('pImages').files; 
            const msg = document.getElementById('statusMessage');

            if(!name || !cost || !price || !stock || files.length === 0) return msg.innerHTML = "<span style='color:#ef4444;'>Lengkapi semua data & pilih foto!</span>";
            if(files.length > 5) return msg.innerHTML = "<span style='color:#ef4444;'>Maksimal 5 foto!</span>";
            for(let i=0; i<files.length; i++) if(files[i].size > 1024 * 1024) return msg.innerHTML = `<span style='color:#ef4444;'>Foto ke-${i+1} kebesaran! Maks 1MB.</span>`;

            msg.innerHTML = "<span style='color:white;'>Mengunggah...</span>";
            const readFiles = Array.from(files).map(file => new Promise(resolve => { const reader = new FileReader(); reader.onload = e => resolve(e.target.result); reader.readAsDataURL(file); }));

            Promise.all(readFiles).then(base64Images => {
                db.ref('products').push({ name: name, category: category, cost: parseInt(cost), price: parseInt(price), stock: parseInt(stock), images: base64Images, timestamp: Date.now() }).then(() => {
                    msg.innerHTML = "<span style='color:#4ade80;'>✅ Upload Sukses!</span>";
                    document.getElementById('pName').value=''; document.getElementById('pCost').value=''; document.getElementById('pPrice').value=''; document.getElementById('pStock').value=''; document.getElementById('pImages').value='';
                    setTimeout(() => { msg.innerHTML = ""; }, 3000);
                });
            });
        }

        function loadManageProducts() {
            db.ref('products').on('value', snapshot => {
                const data = snapshot.val(); const list = document.getElementById('manageProductsList');
                if(!data) return list.innerHTML = '<p style="color:#aaa; text-align:center;">Belum ada produk.</p>';
                let prodHtml = '';
                Object.keys(data).map(key => ({ id: key, ...data[key] })).sort((a,b) => b.timestamp - a.timestamp).forEach(p => {
                    const thumbImg = p.images ? p.images[0] : p.image;
                    prodHtml += `<div style="background: #1a1a1a; padding: 15px; border: 1px solid #333; margin-bottom: 10px; border-radius: 6px; display: flex; justify-content: space-between; align-items: center;"><div style="display: flex; gap: 15px; align-items: center;"><img src="${thumbImg}" style="width: 50px; height: 50px; object-fit: cover; border-radius: 4px;"><div><b style="color:#fff;">${p.name}</b> <span style="font-size:10px; color:#888;">(${p.category})</span><br><span style="color:#4ade80; font-size:12px;">Jual: Rp ${p.price.toLocaleString('id-ID')}</span></div></div><div style="text-align: right; min-width: 120px;"><div style="display:flex; align-items:center; gap:5px; margin-bottom:5px;"><input type="number" id="edit-stock-${p.id}" value="${p.stock || 0}" style="width:50px; padding:5px; text-align:center; font-weight:bold; border-radius:4px; border:none; color:black;"><button onclick="updateStock('${p.id}')" style="background:#4ade80; color:#000; border:none; padding:5px; border-radius:4px; font-size:10px; font-weight:bold; cursor:pointer;">UPDATE</button></div><button onclick="deleteProduct('${p.id}')" style="background: transparent; color: #ef4444; border: 1px solid #ef4444; padding: 5px; border-radius: 4px; font-size: 10px; cursor: pointer; width: 100%; font-weight: bold;">🗑️ HAPUS</button></div></div>`;
                });
                list.innerHTML = prodHtml;
            });
        }

        function updateStock(id) { const newStock = document.getElementById('edit-stock-' + id).value; db.ref('products/' + id).update({ stock: parseInt(newStock) }).then(() => alert('Stok diupdate!')); }
        function deleteProduct(id) { if(confirm("Yakin hapus produk?")) { db.ref('products/' + id).remove(); } }

        let allOrdersData = [];
        function loadOrders() {
            db.ref('orders').on('value', snapshot => {
                const data = snapshot.val(); const list = document.getElementById('ordersList');
                if(!data) { allOrdersData = []; return list.innerHTML = '<p style="color:#aaa; text-align:center;">Belum ada pesanan.</p>'; }
                allOrdersData = Object.keys(data).map(key => ({ id: key, ...data[key] })).sort((a,b) => b.timestamp - a.timestamp);
                let ordersHtml = '';
                allOrdersData.forEach(o => {
                    let itemsStr = o.items.map(i => `- ${i.qty}x ${i.name}`).join('<br>');
                    let totalHPP = 0; o.items.forEach(i => { totalHPP += (i.cost || 0) * i.qty; });
                    ordersHtml += `<div class="order-card"><div class="order-header"><span>${o.invoice_no}</span><span class="badge-status status-${o.status}">${o.status}</span></div><div style="margin-bottom:10px; color:#ccc;"><b style="color:white;">Penerima:</b> ${o.customer.name} (WA: ${o.customer.phone})<br><b style="color:white;">Alamat:</b> ${o.customer.address}</div><div style="background:#0a0a0a; padding:10px; border-radius:6px; margin-bottom:10px; border: 1px solid #333;">${itemsStr}<br><div style="display:flex; justify-content:space-between; margin-top:10px; border-top:1px dashed #333; padding-top:5px;"><b style="color:#4ade80;">Jual: Rp ${o.total.toLocaleString('id-ID')}</b><b style="color:#f59e0b; font-size:11px;">(Laba: Rp ${(o.total - totalHPP).toLocaleString('id-ID')})</b></div></div><div style="text-align:right;">${o.status === 'UNPAID' ? `<button class="btn-status" onclick="updateStatus('${o.id}', 'PAID')">✅ LUNAS</button>` : ''} ${o.status === 'PAID' ? `<button class="btn-status" onclick="updateStatus('${o.id}', 'SHIPPED')">📦 DIKIRIM (PO)</button>` : ''}</div></div>`;
                });
                list.innerHTML = ordersHtml; loadFinanceReport();
            });
        }
        function updateStatus(orderId, newStatus) { db.ref('orders/' + orderId).update({ status: newStatus }); }

        function loadFinanceReport() {
            let totalOmzet = 0; let totalModalPO = 0; let totalLaba = 0; let poListHtml = '';
            allOrdersData.forEach(o => {
                if (o.status === 'PAID' || o.status === 'SHIPPED') {
                    let hppOrderIni = 0; o.items.forEach(i => { hppOrderIni += (i.cost || 0) * i.qty; });
                    totalOmzet += o.total; totalModalPO += hppOrderIni; totalLaba += (o.total - hppOrderIni);
                    poListHtml += `<div style="background: #1a1a1a; padding: 10px; border: 1px solid #333; margin-bottom: 5px; border-radius: 6px; display: flex; justify-content: space-between; align-items: center;"><div><b style="color:#fff;">${o.invoice_no}</b> <span style="color:#888; font-size:10px;">(${o.status})</span><br><span style="color:#aaa;">Penjualan: Rp ${o.total.toLocaleString('id-ID')}</span></div><div style="text-align: right;"><span style="color:#ef4444; font-weight:bold;">Bayar Supplier: Rp ${hppOrderIni.toLocaleString('id-ID')}</span><br><span style="color:#4ade80; font-weight:bold; font-size:11px;">Profit: +Rp ${(o.total - hppOrderIni).toLocaleString('id-ID')}</span></div></div>`;
                }
            });
            document.getElementById('finOmzet').innerText = `Rp ${totalOmzet.toLocaleString('id-ID')}`; document.getElementById('finHPP').innerText = `Rp ${totalModalPO.toLocaleString('id-ID')}`; document.getElementById('finLaba').innerText = `Rp ${totalLaba.toLocaleString('id-ID')}`;
            document.getElementById('poListTable').innerHTML = poListHtml === '' ? '<p style="color:#888; text-align:center;">Belum ada data.</p>' : poListHtml;
        }
    </script>
</body>
</html>
