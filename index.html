<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GANKETI | Premium Original Streetwear</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;800;900&family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0a0a0a; --text: #ffffff; --card: #141414; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Poppins', sans-serif; }

        header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; position: sticky; top: 0; background: rgba(10,10,10,0.9); z-index: 100; backdrop-filter: blur(10px);}
        .logo { font-family: 'Montserrat', sans-serif; font-size: 22px; font-weight: 900; letter-spacing: 2px; }
        .nav-actions { display: flex; gap: 10px; }
        .action-btn { background: transparent; color: white; border: 1px solid #444; padding: 8px 15px; border-radius: 30px; font-weight: 600; cursor: pointer; transition: 0.3s; font-size: 12px; }
        .action-btn.primary { background: #fff; color: #000; border-color: #fff; }
        .action-btn:hover { background: #ccc; color: #000; }
        
        .hero { text-align: center; padding: 60px 20px; background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1556821840-3a63f95609a7?ixlib=rb-4.0.3&auto=format&fit=crop&w=1000&q=80') center/cover; }
        .hero h1 { font-family: 'Montserrat', sans-serif; font-size: 36px; font-weight: 900; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 10px;}

        .container { padding: 30px 20px; max-width: 1200px; margin: 0 auto; }
        .section-title { font-family: 'Montserrat', sans-serif; font-size: 20px; font-weight: 800; text-transform: uppercase; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
        .card { background: var(--card); border: 1px solid #222; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); border-color: #555; }
        .img-box { width: 100%; height: 250px; background: #222; position: relative; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        .badge { position: absolute; top: 10px; left: 10px; background: white; color: black; font-size: 10px; font-weight: 800; padding: 3px 8px; text-transform: uppercase; }
        .info { padding: 15px; }
        .cat { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
        .name { font-size: 14px; font-weight: 600; margin-bottom: 10px; line-height: 1.4; }
        .price { font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 16px; margin-bottom: 15px; }
        .btn-add { background: transparent; color: white; border: 1px solid white; width: 100%; padding: 10px; font-weight: 600; cursor: pointer; text-transform: uppercase; font-size: 12px; transition: 0.2s;}
        .btn-add:hover { background: white; color: black; }

        /* MODAL SYSTEM */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .modal-box { background: #141414; width: 90%; max-width: 450px; border-radius: 12px; border: 1px solid #333; padding: 25px; max-height: 90vh; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; font-weight: 800; font-size: 18px; border-bottom: 1px solid #333; padding-bottom: 15px; margin-bottom: 15px; font-family: 'Montserrat', sans-serif; }
        .close-btn { color: #ef4444; cursor: pointer; font-size: 14px; }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 11px; color: #aaa; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px;}
        .form-group input, .form-group textarea { width: 100%; padding: 12px; background: #222; border: 1px solid #444; color: white; font-family: 'Poppins', sans-serif; border-radius: 6px; box-sizing: border-box;}
        
        .btn-checkout { background: #fff; color: #000; width: 100%; padding: 15px; border: none; font-weight: 800; font-family: 'Montserrat', sans-serif; margin-top: 10px; cursor: pointer; text-transform: uppercase; transition: 0.3s;}
        .btn-checkout:hover { background: #ccc; }
        
        .cart-item { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 15px; border-bottom: 1px dashed #333; padding-bottom: 10px; }
        .invoice-box { background: #fff; color: #000; padding: 20px; font-family: monospace; font-size: 12px; border-radius: 8px; margin-top: 15px;}
        
        /* TRACKING RESULT DESIGN */
        .track-result { background: #222; padding: 15px; border-radius: 8px; margin-top: 15px; border: 1px solid #444; display: none; }
        .status-badge { display: inline-block; padding: 5px 15px; border-radius: 30px; font-size: 12px; font-weight: bold; margin-bottom: 10px;}
        .status-UNPAID { background: #ef4444; color: white; }
        .status-PAID { background: #f59e0b; color: #000; }
        .status-SHIPPED { background: #4ade80; color: #000; }
    </style>
</head>
<body>

    <header>
        <div class="logo">GANKETI</div>
        <div class="nav-actions">
            <button class="action-btn" onclick="openTrackModal()">🔍 TRACK ORDER</button>
            <button class="action-btn primary" onclick="openCart()">🛒 CART [<span id="cartCount">0</span>]</button>
        </div>
    </header>

    <div class="hero">
        <h1>Authentic Streetwear</h1>
        <p>Elevate your style with GANKETI original collections.</p>
    </div>

    <div class="container">
        <h2 class="section-title">Shop Collection</h2>
        <div class="grid" id="productGrid">
            <p style="text-align: center; width: 100%; color: #888;">Memuat koleksi...</p>
        </div>
    </div>

    <div class="modal" id="mainModal">
        <div class="modal-box">
            <div class="modal-header">
                <span id="modalTitle">MODAL TITLE</span>
                <span class="close-btn" onclick="closeModal()">✕ CLOSE</span>
            </div>
            
            <div id="cartArea" style="display:none;">
                <div id="cartItemsList"></div>
                <div style="display: flex; justify-content: space-between; font-weight: bold; font-size: 16px; margin-top: 20px;">
                    <span>SUBTOTAL:</span><span id="cartTotalDisplay">Rp 0</span>
                </div>
                <button class="btn-checkout" onclick="goToShipping()">PROCEED TO CHECKOUT ➔</button>
            </div>

            <div id="shippingArea" style="display:none;">
                <div class="form-group"><label>Nama Lengkap</label><input type="text" id="cName"></div>
                <div class="form-group"><label>No. WhatsApp</label><input type="number" id="cPhone"></div>
                <div class="form-group"><label>Alamat & Kode Pos</label><textarea id="cAddress" rows="3"></textarea></div>
                <button class="btn-checkout" onclick="buatPesananSekarang()">PLACE SECURE ORDER 🔒</button>
            </div>

            <div id="invoiceArea" style="display:none;">
                <p style="text-align:center; color:#4ade80; font-weight:bold;">✅ ORDER CREATED!</p>
                <p style="text-align:center; font-size:12px; color:#aaa;">Simpan Nomor Invoice ini untuk melacak pesanan Anda.</p>
                <div class="invoice-box" id="invoicePaper"></div>
            </div>

            <div id="trackArea" style="display:none;">
                <div class="form-group">
                    <label>Masukkan Nomor Invoice</label>
                    <input type="text" id="trackInv" placeholder="Contoh: INV-GKT-123456789">
                </div>
                <button class="btn-checkout" onclick="lacakPesanan()">TRACK NOW 🔍</button>
                
                <div class="track-result" id="trackResult">
                    <div id="trackStatus" class="status-badge status-UNPAID">UNPAID</div>
                    <div style="font-size:12px; color:#aaa; line-height:1.6;" id="trackDetails">
                        </div>
                </div>
            </div>

        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDoh1VBH6YEicKHPyViPi0NUsnILaTin8g",
            authDomain: "ganketi.firebaseapp.com",
            databaseURL: "https://ganketi-default-rtdb.firebaseio.com",
            projectId: "ganketi",
            storageBucket: "ganketi.firebasestorage.app",
            messagingSenderId: "61078873925",
            appId: "1:61078873925:web:c5bf3bdf7cc18f11d6002c"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let globalProducts = [];
        let cart = JSON.parse(localStorage.getItem('ganketiCart') || '[]');
        updateCartCount();

        // LOAD PRODUCTS
        db.ref('products').on('value', (snapshot) => {
            const data = snapshot.val();
            const grid = document.getElementById('productGrid');
            if(!data) return grid.innerHTML = '<p style="text-align:center; width:100%; color:#888;">No products available.</p>';

            globalProducts = Object.keys(data).map(key => ({ id: key, ...data[key] })).sort((a, b) => b.timestamp - a.timestamp);
            grid.innerHTML = globalProducts.map(p => `
                <div class="card">
                    <div class="img-box"><div class="badge">Original</div><img src="${p.image}"></div>
                    <div class="info">
                        <div class="cat">${p.category}</div><div class="name">${p.name}</div>
                        <div class="price">Rp ${p.price.toLocaleString('id-ID')}</div>
                        <button class="btn-add" onclick="addToCart('${p.id}')">+ ADD TO CART</button>
                    </div>
                </div>
            `).join('');
        });

        // MODAL HANDLERS
        function closeModal() { document.getElementById('mainModal').style.display = 'none'; }
        function hideAllAreas() { 
            ['cartArea', 'shippingArea', 'invoiceArea', 'trackArea'].forEach(id => document.getElementById(id).style.display = 'none'); 
        }

        // CART LOGIC
        function addToCart(id) {
            const product = globalProducts.find(p => p.id === id);
            const existing = cart.find(c => c.id === id);
            if(existing) existing.qty += 1; else cart.push({ ...product, qty: 1 });
            localStorage.setItem('ganketiCart', JSON.stringify(cart)); updateCartCount(); openCart();
        }

        function updateCartCount() { document.getElementById('cartCount').innerText = cart.reduce((sum, item) => sum + item.qty, 0); }

        function openCart() {
            hideAllAreas();
            document.getElementById('modalTitle').innerText = "YOUR CART";
            document.getElementById('cartArea').style.display = 'block';
            document.getElementById('mainModal').style.display = 'flex';
            
            const list = document.getElementById('cartItemsList');
            let total = 0;

            if (cart.length === 0) { list.innerHTML = '<p style="color:#666; text-align:center;">Cart is empty.</p>'; } 
            else {
                list.innerHTML = cart.map((item, index) => {
                    total += (item.price * item.qty);
                    return `<div class="cart-item">
                        <div style="width:70%;"><b>${item.name}</b><br><span style="color:#888;">${item.qty} x Rp ${item.price.toLocaleString('id-ID')}</span></div>
                        <div style="text-align:right; font-weight:bold;">Rp ${(item.price * item.qty).toLocaleString('id-ID')}<br><span style="color:#ef4444; cursor:pointer;" onclick="removeItem(${index})">Remove</span></div>
                    </div>`;
                }).join('');
            }
            document.getElementById('cartTotalDisplay').innerText = `Rp ${total.toLocaleString('id-ID')}`;
        }

        function removeItem(index) { cart.splice(index, 1); localStorage.setItem('ganketiCart', JSON.stringify(cart)); updateCartCount(); openCart(); }
        function goToShipping() {
            if(cart.length === 0) return alert("Cart is empty!");
            hideAllAreas();
            document.getElementById('modalTitle').innerText = "SHIPPING DETAILS";
            document.getElementById('shippingArea').style.display = 'block';
        }

        // CHECKOUT LOGIC
        function buatPesananSekarang() {
            const cName = document.getElementById('cName').value; const cPhone = document.getElementById('cPhone').value; const cAddress = document.getElementById('cAddress').value;
            if(!cName || !cPhone || !cAddress) return alert("Mohon lengkapi data pengiriman!");

            const invoiceNumber = "INV-GKT-" + Date.now();
            const orderDate = new Date().toLocaleString('id-ID');
            let grandTotal = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);

            // SIMPAN KE FIREBASE
            db.ref('orders').push({
                invoice_no: invoiceNumber, date: orderDate, customer: { name: cName, phone: cPhone, address: cAddress },
                items: cart, total: grandTotal, status: "UNPAID", timestamp: Date.now()
            }); 

            // RENDER INVOICE
            let itemsHtml = cart.map(i => `${i.qty}x ${i.name.substring(0,15)}... <span style="float:right;">${(i.price * i.qty).toLocaleString('id-ID')}</span>`).join('<br>');
            document.getElementById('invoicePaper').innerHTML = `
                <div style="text-align:center; font-weight:bold; font-size:16px; margin-bottom:10px; border-bottom:2px dashed #000; padding-bottom:10px;">GANKETI OFFICIAL</div>
                INV NO : <b style="color:blue;">${invoiceNumber}</b><br>DATE   : ${orderDate}<br>
                NAME   : ${cName}<br>
                <hr style="border-top:1px dashed #000; margin:10px 0;">
                ${itemsHtml}
                <hr style="border-top:1px dashed #000; margin:10px 0;">
                <b>GRAND TOTAL : <span style="float:right; font-size:14px;">Rp ${grandTotal.toLocaleString('id-ID')}</span></b>
            `;

            cart = []; localStorage.setItem('ganketiCart', JSON.stringify(cart)); updateCartCount();
            
            hideAllAreas();
            document.getElementById('modalTitle').innerText = "ORDER SUMMARY";
            document.getElementById('invoiceArea').style.display = 'block';
        }

        // FUNGSI BARU: TRACKING SYSTEM SEPERTI SHOPEE
        function openTrackModal() {
            hideAllAreas();
            document.getElementById('modalTitle').innerText = "TRACK YOUR ORDER";
            document.getElementById('trackResult').style.display = 'none';
            document.getElementById('trackInv').value = '';
            document.getElementById('trackArea').style.display = 'block';
            document.getElementById('mainModal').style.display = 'flex';
        }

        function lacakPesanan() {
            const invQuery = document.getElementById('trackInv').value.trim();
            if(!invQuery) return alert("Masukkan Nomor Invoice!");

            const resultBox = document.getElementById('trackResult');
            const statusBadge = document.getElementById('trackStatus');
            const detailsText = document.getElementById('trackDetails');
            
            detailsText.innerHTML = "Mencari data pesanan...";
            resultBox.style.display = 'block';

            // Cek ke Database Firebase
            db.ref('orders').orderByChild('invoice_no').equalTo(invQuery).once('value', snapshot => {
                const data = snapshot.val();
                
                if(!data) {
                    statusBadge.className = "status-badge status-UNPAID";
                    statusBadge.innerText = "NOT FOUND";
                    detailsText.innerHTML = "Pesanan tidak ditemukan. Pastikan Nomor Invoice (INV-GKT-...) sudah benar.";
                    return;
                }

                // Ambil data pertama dari hasil pencarian
                const orderKey = Object.keys(data)[0];
                const orderData = data[orderKey];

                statusBadge.className = `status-badge status-${orderData.status}`;
                statusBadge.innerText = orderData.status;

                let message = "";
                if(orderData.status === "UNPAID") message = "Pesanan Anda sudah tercatat, namun kami belum menerima konfirmasi pembayaran. Silakan selesaikan pembayaran agar pesanan dapat diproses.";
                if(orderData.status === "PAID") message = "Pembayaran telah kami terima! Tim GANKETI sedang menyiapkan dan mengemas pesanan Anda.";
                if(orderData.status === "SHIPPED") message = "Pesanan Anda telah diserahkan ke pihak logistik dan sedang dalam perjalanan menuju alamat pengiriman.";

                detailsText.innerHTML = `
                    <b>Penerima:</b> ${orderData.customer.name}<br>
                    <b>Tanggal Order:</b> ${orderData.date}<br>
                    <b>Total Belanja:</b> Rp ${orderData.total.toLocaleString('id-ID')}<br><br>
                    <span style="color:white;">${message}</span>
                `;
            });
        }
    </script>
</body>
</html>
